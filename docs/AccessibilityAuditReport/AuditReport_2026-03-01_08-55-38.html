<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>Accessibility Audit Results</title>
        <style>
            .ax-report-tab { display: flex; flex-direction: column; flex: 1; min-width: 0; }
            .ax-report-results-container { display: flex; flex-direction: column; overflow-y: auto; margin-top: 1em;  }
            .ax-report-results-container h2 { margin-top: 0; }
            .ax-report-image-container { display: flex; flex-direction: row; background: #ffffff; padding-top: 0.5em; padding-bottom: 0.5em; border-top: 1px solid #C7C7CC; }
            .ax-report-image-row { display: flex; flex-direction: row; flex: 1 1 auto; overflow-x: auto; overflow-y: visible; scroll-snap-type: x mandatory;}
            .ax-report-total-warnings { align-self: flex-end; margin-top: 0.5em; margin-right: 1em; margin-bottom: 0.5em; font-weight: bold;}
          
            .ax-report-category-container { background: white; border-top: 1px solid #C7C7CC; }
            .ax-report-category-container:last-child { border-bottom: 1px solid #C7C7CC;}
            .ax-report-category-container, .ax-report-subcategory-container { padding: 1em;  display: flex; flex-direction: column; }
            .ax-report-subcategory-container {
              background-color: rgb(235,235,240) /* systemGray6 */; margin-bottom: 0; margin-top: 1em; border-radius: 0.25em;
            }
            .ax-report-category-container h3, .ax-report-subcategory-container h3 { margin-top: 0; margin-bottom: 0; }
            .ax-report-category-header, .ax-report-subcategory-header { cursor: pointer; display: flex; align-items: center; }
            .ax-report-category-header > .ax-report-warning-tag, .ax-report-subcategory-header > .ax-report-warning-tag {
              white-space: nowrap; background-color: rgb(255,179,64); border-radius: 50rem; font-size: 0.75em; padding: .35em .35em; color: white; font-weight: normal; margin-left: 1em; }
            .ax-report-subcategory-header { font-weight: normal; margin: 0; }
            .ax-report-category-text { flex: 1 1 auto; }

            .ax-report-side-icon:after { content: '\25B6'; }
            .ax-report-side-icon { float: left; margin-right: 0.5em; font-size: 0.8em; }
            .ax-report-down-icon:after { content: '\25BC'; }
            .ax-report-warning-icon:after { content: '\26A0'; }
            .ax-report-down-icon { float: left; margin-right: 0.5em; font-size: 0.8em; }
            .ax-report-next-icon:after { content: '\25B6'; color: #ffffff; }
            .ax-report-prev-icon:after { content: '\25C0'; color: #ffffff; }
            .ax-report-next-icon, .ax-report-prev-icon { margin-right: 0.5em; background-color: #AEAEB2; padding: 0.5em; align-self: center; border-radius: 0.2em; cursor: pointer; margin-left: 0.5em; }
            .ax-report-suggestion-icon:after { content: '\003F' } /*  */
            .ax-report-suggestion-icon, .ax-report-eye-icon { background-color: #30B0C7; padding-left: 0.6em; padding-right: 0.6em; padding-top: 0.25em; padding-bottom: 0.25em; border-radius: 50%; color: #ffffff; float: right; cursor: pointer ;}
            .ax-report-eye-icon { padding-left: 0.5em; padding-right: 0.5em;}
            .ax-report-eye-icon:after { content: '\26F6'; }
            .ax-report-home-icon { font-size: 1.25em; }
            .ax-report-home-icon:after { content: '\2302'; }
            .ax-report-hamburger-icon:after { content: '\2630'; }
            .ax-report-hamburger-icon { font-size: 1.25em;}
            .ax-report-close-icon { display: none; font-size: 1.25em; }
            .ax-report-close-icon:after { content: '\2715'; }

            .ax-report-issues-table { border-collapse: collapse; margin-top: 1em; width: 100%; }
            .ax-report-issues-table-row { display: flex; flex-direction: row; cursor: pointer; border: 1px solid #dddfe1; border-width: 1px; background-color: #ffffff;}
            .ax-report-issues-table-row td { padding: 0.5rem; display: flex; flex-direction: column; justify-content: center; word-wrap: break-word; word-break: break-all;}
            .ax-report-issues-table-row td span { word-wrap: break-word; word-break: break-all; }
            .ax-report-issues-table-row td:first-child { flex: 1 1 auto; }
            .ax-report-issues-table-row td span:nth-child(2) { margin-top: 0.5em; margin-left: 1em; font-style: italic; color: rgb(54,54,56); }
            .ax-report-duplicates-info { cursor: pointer; align-self: flex-start; margin-top: 0.5em; color: rgb(0, 122, 255); }

            .ax-report-issues-table-offscreen span {  background-color: #30B0C7; border-radius: 50rem; font-size: 0.75em; padding: .35em .35em; color: white; font-weight: normal; white-space: nowrap;}


            .ax-report-screen-img { position: relative; margin-right: 1em; margin-bottom: 0.5em; margin-top: 0.5em; transition: transform .2s; scroll-snap-align: end; cursor: pointer; border: 1px solid #F2F2F7; }
            .ax-report-screen-img-empty { padding-top: 1em; padding-bottom: 1em; width: 100px; border: 1px solid #F2F2F7; text-align: center; display: flex; flex-direction: column; justify-content: center;}
            .ax-report-issue-box { position: absolute; /* systemYello */ border: 1px solid white; display: flex; }
            .ax-report-issue-box-inner { z-index: 1; flex: 1 1 auto; display: flex; border: 1px solid black; }
            .ax-report-issue-box-inner-nested { border: 1px solid white; background-color:  rgba(0, 122, 255, 0.5); z-index: 2; flex: 1 1 auto; }

            .ax-report-tab-links { display: flex; flex-direction: column; overflow-y: auto;  background-color: rgb(235,235,240); /* systemGray6 */ }
            .ax-report-tab-screen-link { height: 100px; display: flex; justify-content: center; }
            .ax-report-tab-hamburger-link { display: none; }

            .ax-report-tab-screen-link img { height: 100%; }
            .ax-report-tab-link {  padding: 1em; cursor: pointer;  text-align: center; }
            .ax-report-tab-link:hover { background-color: rgb(216,216,220); }
            .ax-report-tab-link:first-child { border-top: 1px solid rgb(199,199,204); border-bottom: 1px solid rgb(199,199,204); }

            .ax-report-preview-container { position: absolute; z-index: 100; left: 50%; top: 50%; transform: translate(-50%, -50%); box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px; background-color: white;}
            .ax-report-preview-container .ax-report-screen-img { margin: 0; }
            .ax-report-dimmer { background-color: black; z-index: 50; opacity: 0.5; position: absolute; top: 0; left: 0; bottom: 0; right: 0; }
            .hidden { display: none !important; }
            .selected { background-color: rgb(188,188,192); }
            .selected-row { background-color:  rgb(216,216,220); /* systemGray5 */}
            .selected-category { background-color:  rgb(216,216,220); /* rgb(188,188,192); */  }
            .sticky { position: fixed; top: 0; width: 100%; }
            i { font-style: normal; }
            body { font-family: 'SF Pro Text', 'SF Pro Icons', 'Helvetica Neue', 'Helvetica',
    'Arial', sans-serif; display: flex; align-items: stretch; height: 100vh; flex-direction: row; margin: 0; }
            /* iPhone 14 Pro Max and below */
            @media (max-width: 428px) {
              /* iPhone */
              .ax-report-prev-icon, .ax-report-next-icon { display: none; }
              .ax-report-tab-links .ax-report-tab-link { display: none; }
              .ax-report-tab-links .ax-report-tab-link.ax-report-tab-hamburger-link { display: block; }
              .ax-report-tab-links.over {position: absolute; top: 0; left: 0; bottom:0; z-index: 1; }
              .ax-report-tab-links.over .ax-report-close-icon { display: block; margin-right: 1em;}
              .ax-report-tab-links.over .ax-report-tab-link { display: flex; align-items: baseline; z-index: 1; }
              .ax-report-tab-links.over .ax-report-tab-hamburger-link { display: none;}
              .ax-report-issues-table-offscreen span { max-width: 1.65em; height: 1.65em; text-overflow: ellipsis; overflow: hidden;}
            }
        </style>

        <script>
            let AuditReport = (function(screenShotData) {
                this.ids = {
                    previewContainer: "ax_report_preview_container",
                    dimmer: "ax_report_dimmer",
                    imageContainer: "ax_report_image_container",
                    templateImage: "ax_report_template_image",
                    templateBox: "ax_report_template_box",
                    imageRow: "ax_report_image_row",
                    resultsContainer: "ax_report_results_container",
                    categoryHeader: "ax_report_category_header",
                    categoryContainer: "ax_report_category_container",
                    subcategoryHeader: "ax_report_subcategory_header",
                    subcategoryContainer: "ax_report_subcategory_container",
                    issuesTable: "ax_report_issues_table",
                    tabScreenLink: "ax_report_tab_screen_link",
                    tabLinks: "ax_report_tab_links",
                    tabSummaryLink: "ax_report_tab_summary_link",
                    summaryTab: "ax_report_summary_tab",
                    summaryIssuesCount: "ax_report_summary_issues_count",
                    screenTab: "ax_report_screen_tab",
                    screenIssuesCount: "ax_report_screen_issues_count",
                    hamburgerLink: "ax_report_tab_hamburger_link",
                    closeIcon: "ax_report_close_icon"
                }

                this.classes = {
                  screenImg: "ax-report-screen-img",
                  screenImgEmpty: "ax-report-screen-img-empty",
                  categoryText: "ax-report-category-text",
                  tabScreenLink: "ax-report-tab-screen-link",
                  duplicatesInfo: "ax-report-duplicates-info",
                  warningTag: "ax-report-warning-tag",
                  issuesTableOffscreen: "ax-report-issues-table-offscreen",
                  suggestionIcon: "ax-report-suggestion-icon",
                  eyeIcon: "ax-report-eye-icon",
                  nextIcon: "ax-report-next-icon",
                  prevIcon: "ax-report-prev-icon",
                  downIcon: "ax-report-down-icon",
                  sideIcon: "ax-report-side-icon",
                  issueBox: "ax-report-issue-box",
                  imageRow: "ax-report-image-row",
                  selectedCategory: "selected-category",
                  hidden: "hidden",
                  selected: "selected",
                  selectedRow: "selected-row"
                }

                this.rootObject = screenShotData;
                this.fullScreenMetaDataArray = [];
                this.fullScreenShotArray = [];
                this.resultContainerArray = [];
                this.selectedTabContainer = undefined;
                this.selectedTabLink = undefined;
                this.selectedRow = undefined;
                this.selectedCategory = undefined;
                this.init = function() {
                    // Summary view screens row.
                    let allIssues = _getAllIssuesInReport(screenShotData);
                    if (allIssues.length == 0) {
                      // hide the tab panel if there are no issues.
                      _hideElement(this.ids.tabLinks);
                    }

                    // Gather up all screen objects for the summary view
                    let allScreens = screenShotData._axKeyAllScreens;
                    let allScreenGroups = [];
                    if (allScreens !== undefined) {
                      // When no screen groups are provided, we'll just create a group for each screen instance.
                      allScreenGroups = _getScreenGroupsForScreens(allScreens);
                    }

                    // Create tabs for screen groups
                    let groups = Object.values(allScreenGroups);
                    _generateTabsForScreenGroups(groups);
                    groups.map((screenGroup) => {
                      let screensInGroup = screenGroup._axKeyAllScreens;
                      let screenGroupName = screenGroup._axKeyScreenGroupName;
                      _generateAllScreensRow(screensInGroup, screenGroupName);
                    });

                    if (allIssues.length > 0) {
                      _generateAllScreensRow(allScreens, "summary");
                    }

                    // Tab content for summary view
                    _generateTabContent(allIssues, "summary");
                  
                    // Generate tab content for each screen group
                    groups.map((screenGroup) => {
                      let issuesInGroup = screenGroup._axKeyAllIssues;
                      let screenGroupName = screenGroup._axKeyScreenGroupName;
                      _generateTabContent(issuesInGroup, screenGroupName);
                    });

                    document.body.addEventListener("click", (evt) => {
                      // Dismiss the current selection on body click
                      _showAllScreens();
                      _clearBoxesOnImages();
                      _clearSelectedRow();
                      _hideImagePreview();

                      let tabLinks = document.getElementById(this.ids.tabLinks);
                      tabLinks.classList.remove("over");
                    });
                }.bind(this);

                function _getScreenGroupsForScreens(screens) {
                  var screenGroups = {}
                  screens.map((screen) => {
                    if (screen._axKeyScreenGroupName !== undefined) {
                      if (screenGroups[screen._axKeyScreenGroupName] == undefined) {
                        screenGroups[screen._axKeyScreenGroupName]  = {
                          "_axKeyAllScreens": [],
                          "_axKeyAllIssues": [],
                          "_axKeyScreenGroupName": screen._axKeyScreenGroupName
                        }
                      }
                      screenGroups[screen._axKeyScreenGroupName]._axKeyAllScreens.push(screen);
                      screenGroups[screen._axKeyScreenGroupName]._axKeyAllIssues.push(...screen._axKeyAllIssues);
                    }
                  });
                  return screenGroups;
                }

                /**
                 * Get a list of all issues from the screenshot data
                 **/
                function _getAllIssuesInReport(screenShotData) {
                  let allIssuesInReport = [];
                  let allScreens = screenShotData._axKeyAllScreens;
                  if (allScreens !== undefined) {
                    allScreens.map((screen) => {
                      let allIssues = screen._axKeyAllIssues;
                      allIssues.map((issue) => {
                        issue._axKeyScreenName = screen._axKeyScreenName;
                      });

                      allIssuesInReport.push(...allIssues);
                    });
                  }
                  return allIssuesInReport;
                }

                /**
                 * Generates a dictionary mapping each category its corresponding issues.
                 **/
                function _generateIssueCategoryMap(issues) {
                  let allIssuesByCategory = {}
                  issues.map((issue) => {
                    let issueTestType = issue._axKeyIssueTestType;
                    let issueSubcategory = issue._axKeyShortDesc;
                    if (!(issueTestType in allIssuesByCategory)) {
                      allIssuesByCategory[issueTestType] = {};
                    }

                    if (!(issueSubcategory in allIssuesByCategory[issueTestType])) {
                      allIssuesByCategory[issueTestType][issueSubcategory] = []
                    }

                    allIssuesByCategory[issueTestType][issueSubcategory].push(issue);
                  });

                  return allIssuesByCategory;
                };

                /**
                 * Generate the contents for each tab section from the list of issues
                 **/
                function _generateTabContent(issues, sectionName) {
                    let resultsContainer = document.getElementById(this.ids.resultsContainer);
                    let resultsContainerCopy = resultsContainer.cloneNode();
                    
                    // Handler for the hamburger icon for mobile
                    if (sectionName == "summary") {
                      let tabLinks = document.getElementById(this.ids.tabLinks);
                      let hamburgerLink = document.getElementById(this.ids.hamburgerLink);
                      hamburgerLink.addEventListener("click", (evt) => {
                        evt.stopPropagation();
                        if (tabLinks.classList.contains("over")) {
                          tabLinks.classList.remove("over");
                        } else {
                          tabLinks.classList.add("over");
                        }
                      });

                      let closeIcon = document.getElementById(this.ids.closeIcon);
                      closeIcon.addEventListener("click", (evt) => {
                          evt.stopPropagation();
                          tabLinks.classList.remove("over");
                      });
                    }

                    let nonDuplicates = issues.filter((issue) => {
                      return !issue._axKeyIssueIsDuplicate;
                    });
                    let issuesCount = nonDuplicates.length;

                    let allIssuesContainer = document.getElementById(`ax_report_${sectionName}_issues_count`);
                    let allIssuesSpan = allIssuesContainer.getElementsByTagName("span");
                    allIssuesSpan[0].textContent = issuesCount;

                    if (issuesCount == 0) {
                      // If no issues were found, we'll just display that.
                      return;
                    }

                    let tabContainer = document.getElementById(`ax_report_${sectionName}_tab`);

                    let issuesMappedToCategory = _generateIssueCategoryMap(issues);
                    let categories = Object.keys(issuesMappedToCategory);
                    categories.map((category) => {
                      let categoryContainer = document.getElementById(this.ids.categoryContainer);
                      let categoryContainerCopy = categoryContainer.cloneNode(true);

                      // Header
                      var issuesInCategory = Object.keys(issuesMappedToCategory[category]).map((subcategory) => {
                        return issuesMappedToCategory[category][subcategory];
                      });
                      var subcategoriesToIssues = issuesMappedToCategory[category];
                      issuesInCategory = issuesInCategory.flat(Infinity);

                      let categoryHeader = _generateReportCategoryHeader(category, issuesInCategory, sectionName, true);
                      categoryContainerCopy.appendChild(categoryHeader);

                      // Generate containers for each subcategory
                      let subcategoryContainers = _generateReportSubcategoryHeaders(categoryContainerCopy, subcategoriesToIssues, sectionName);

                      categoryHeader.addEventListener("click", (evt) => {
                        _clickCategoryRow(evt, sectionName, categoryHeader, categoryContainerCopy, issuesInCategory, subcategoryContainers);
                      });

                      categoryContainerCopy.classList.remove(this.classes.hidden);
                      resultsContainerCopy.appendChild(categoryContainerCopy);
                    });

                    resultsContainerCopy.classList.remove(this.classes.hidden);
                    tabContainer.insertBefore(resultsContainerCopy, allIssuesContainer);
                }

                /**
                 * Set the selected tab when a new tab is clicked
                 **/
                function _tabLinkClicked(tabContainer, tabLink) {
                  this.selectedTabContainer.classList.add(this.classes.hidden);
                  tabContainer.classList.remove(this.classes.hidden);
                  this.selectedTabContainer = tabContainer;

                  this.selectedTabLink.classList.remove(this.classes.selected);
                  tabLink.classList.add(this.classes.selected);
                  this.selectedTabLink = tabLink;
                }

                /***
                 * Generate the tab button on the side panel for each of the screen groups.
                 **/
                function _generateTabsForScreenGroups(screenGroups) {
                  // Summary tab should be selected by default
                  let summaryTab = document.getElementById(this.ids.summaryTab);
                  this.selectedTabContainer = summaryTab;

                  let summaryLink = document.getElementById(this.ids.tabSummaryLink);
                  this.selectedTabLink = summaryLink;
                  
                  // add interactivity for switching tabs
                  selectedTabLink.addEventListener("click", (evt) => {
                    // Activate the tab for this screen group
                    _tabLinkClicked(summaryTab, summaryLink);
                  });

                  let tabContainer = document.getElementById(this.ids.tabLinks);
                  screenGroups.map((screenGroup) => {
                    let screenGroupName = screenGroup._axKeyScreenGroupName;
                    let allScreens = screenGroup._axKeyAllScreens;
                    if (allScreens.length > 0) {
                      let firstScreen = allScreens[0];
                      var firstScreenImage = undefined;
                      if (firstScreen._axKeyImageFull !== undefined) {
                        firstScreenImage = firstScreen._axKeyImageFull._axKeyImageData;
                      }
                      let tabScreenLink = document.getElementById(this.ids.tabScreenLink);
                      let tabScreenLinkCopy = tabScreenLink.cloneNode(true);

                      if (firstScreenImage !== undefined) {
                        // Just use the first image in the group to represent the tab
                        let img = tabScreenLinkCopy.getElementsByTagName("img");
                        img[0].setAttribute("src", firstScreenImage);
                      }
                      else {
                        tabScreenLinkCopy.textContent = "No image found";
                      }

                      // Create the tab container
                      let tab = document.getElementById(this.ids.screenTab);
                      let tabCopy = tab.cloneNode(true);
                      tabCopy.setAttribute("id", `ax_report_${screenGroupName}_tab`)
                      let issuesCount = tabCopy.getElementsByTagName("div")[0];
                      issuesCount.setAttribute("id", `ax_report_${screenGroupName}_issues_count`);
                      document.body.appendChild(tabCopy);

                      // add interactivity for switching tabs
                      tabScreenLinkCopy.addEventListener("click", (evt) => {
                        // Activate the tab for this screen group
                        _tabLinkClicked(tabCopy, tabScreenLinkCopy);
                      });

                      tabScreenLinkCopy.classList.remove(this.classes.hidden);
                      tabContainer.appendChild(tabScreenLinkCopy);
                    }
                  });
                }
              
                /**
                 * Generate the given category header container for a section
                 **/
                function _generateReportCategoryHeader(category, issues, sectionName, isCategory) {
                  let headerId = isCategory ? this.ids.categoryHeader : this.ids.subcategoryHeader;
                  let categoryHeader = document.getElementById(headerId);
                  let categoryHeaderCopy = categoryHeader.cloneNode(true);
                  categoryHeaderCopy.setAttribute("id", `${this.ids.categoryHeader}_${category}_${sectionName}`);

                  let textSpan = categoryHeaderCopy.getElementsByClassName(this.classes.categoryText)[0];
                  textSpan.append(category);

                  let nonDuplicates = issues.filter((issue) => {
                      return !issue._axKeyIssueIsDuplicate;
                  });

                  let numIssues = nonDuplicates.length;

                  let totalSpan = categoryHeaderCopy.getElementsByClassName(this.classes.warningTag)[0];
                  totalSpan.append(`${numIssues} warnings`);

                  categoryHeaderCopy.classList.remove(this.classes.hidden);
                  return categoryHeaderCopy;
                }

                /***
                 * Generate the elements for the subcategory headers within a category container
                 **/
                function _generateReportSubcategoryHeaders(categoryContainer, subcategoriesToIssues, sectionName) {
                  let subcategoryKeys = Object.keys(subcategoriesToIssues);
                  let subcategoryContainers = [];
                  subcategoryKeys.map((subcategory) => {
                    let subcategoryContainer = document.getElementById(this.ids.subcategoryContainer);
                    let subcategoryContainerCopy = subcategoryContainer.cloneNode();
                    let issues = subcategoriesToIssues[subcategory];
                    let subcategoryHeader = _generateReportCategoryHeader(subcategory, issues, sectionName, false);

                    // Create separate tables for duplicates and non-duplicates
                    let duplicates = issues.filter((issue) => {
                      return issue._axKeyIssueIsDuplicate;
                    });
                    let nonDuplicates = issues.filter((issue) => {
                      return !issue._axKeyIssueIsDuplicate;
                    });
                    let issuesTable = _generateReportIssuesTable(nonDuplicates, sectionName);
                    if (nonDuplicates.length == 0) {
                      issuesTable.classList.add(this.classes.hidden);
                    }

                    subcategoryContainerCopy.appendChild(subcategoryHeader);
                    subcategoryContainerCopy.appendChild(issuesTable);

                    var childrenToShowClickHeader = [];
                    if (nonDuplicates.length > 0) {
                      childrenToShowClickHeader.push(issuesTable);
                    }

                    var duplicateIssuesTable = undefined;
                    var duplicatesInfoBox = undefined;
                    if (duplicates.length > 0) {
                      // If we have any duplicates, show them in a separate table we can hide / show
                      duplicateIssuesTable = _generateReportIssuesTable(duplicates, sectionName);
                      let postfix = duplicates.length > 1 ? 'duplicates' : 'duplicate';
                      let duplicatesText = `See ${duplicates.length} ${postfix}`;
                      duplicatesInfoBox = document.createElement("span");
                      duplicatesInfoBox.setAttribute("class", this.classes.duplicatesInfo);
                      duplicatesInfoBox.classList.add(this.classes.hidden);
                      duplicatesInfoBox.textContent = duplicatesText;
                      subcategoryContainerCopy.appendChild(duplicatesInfoBox);
                      subcategoryContainerCopy.appendChild(duplicateIssuesTable);
                      childrenToShowClickHeader.push(duplicatesInfoBox);

                      // Duplicates have a link to hide / show them
                      duplicatesInfoBox.addEventListener("click", (evt) => {
                        if (duplicateIssuesTable.classList.contains(this.classes.hidden)) {
                          duplicateIssuesTable.classList.remove(this.classes.hidden);

                          let end = duplicates.length > 1 ? 'duplicates' : 'duplicate';
                          duplicatesInfoBox.textContent = `Hide ${duplicates.length} ${end}`;
                        }
                        else {
                          duplicateIssuesTable.classList.add(this.classes.hidden);
                          duplicatesInfoBox.textContent = duplicatesText;
                        }
                      });
                    }

                    subcategoryHeader.addEventListener("click", (evt) => {
                      _clickCategoryRow(evt, sectionName, subcategoryHeader, subcategoryContainerCopy, issues, childrenToShowClickHeader);

                      if (duplicateIssuesTable !== undefined && duplicatesInfoBox !== undefined && !duplicateIssuesTable.classList.contains(this.classes.hidden) && duplicatesInfoBox.classList.contains(this.classes.hidden)) {
                        duplicateIssuesTable.classList.add(this.classes.hidden);

                        let end = duplicates.length > 1 ? 'duplicates' : 'duplicate';
                        duplicatesInfoBox.textContent = `See ${duplicates.length} ${end}`;
                      }
                    });

                    categoryContainer.appendChild(subcategoryContainerCopy);
                    subcategoryContainers.push(subcategoryContainerCopy);
                  });
                  return subcategoryContainers;
                }

                /**
                 * Get the box coordinates for this issue
                 **/
                function _getBoxForIssue(issue) {
                  let issueX = issue._axKeyElementRectInScreenshotX;
                  let issueY = issue._axKeyElementRectInScreenshotY;
                  let issueWidth = issue._axKeyElementRectInScreenshotWidth;
                  let issueHeight = issue._axKeyElementRectInScreenshotHeight;
                  let issueBox = {
                    x: issueX,
                    y: issueY,
                    width: issueWidth,
                    height: issueHeight
                  };
                  return issueBox;
                }

                /**
                 * Get the box coordinates for this screen element
                 **/
                function _getBoxForScreen(screen) {
                  // Get the box for the screen here.
                  let screenWidth = screen.offsetWidth;
                  let screenHeight = screen.offsetHeight;
                  let boundingRect = screen.getBoundingClientRect();
                  let screenX = boundingRect.left;
                  let screenY = boundingRect.top;
                  let screenBox = {
                    x: screenX,
                    y: screenY,
                    width: screenWidth,
                    height: screenHeight,
                    right: screenX + screenWidth,
                    bottom: screenY + screenHeight
                  };
                  return screenBox;
                }

                /**
                 * Generate the issue table row for a given section and issue
                 **/
                function _generateIssueRow(sectionName, issue, issueRow) {
                  let issueX = issue._axKeyElementRectInScreenshotX;
                  let issueY = issue._axKeyElementRectInScreenshotY;
                  let issueWidth = issue._axKeyElementRectInScreenshotWidth;
                  let issueHeight = issue._axKeyElementRectInScreenshotHeight;
                  let issueScreenName = issue._axKeyScreenName;

                  let firstRow = issueRow[0];
                  let issueRowCopy = firstRow.cloneNode(true);

                  if (issueX == undefined) {
                    // Box is offscreen, add indicator
                    let offscreenCell = document.createElement("td");
                    offscreenCell.setAttribute("title", "The element bounding box is outside the bounds of the screenshot.")
                    offscreenCell.classList.add(this.classes.issuesTableOffscreen);
                    let offscreenTextSpan = document.createElement("span");
                    offscreenTextSpan.textContent = "Off Screen";
                    offscreenCell.appendChild(offscreenTextSpan);
                    offscreenCell.classList.add(this.classes.hidden);
                    issueRowCopy.prepend(offscreenCell);
                  }

                  let cell = document.createElement("td");
                  let mainTextSpan = document.createElement("span");
                  let extraInfoSpan = document.createElement("span");
                  
                  let br = document.createElement("br");
                  mainTextSpan.textContent = issue._axKeyLongDesc;
                  cell.append(mainTextSpan);
                  
                  if (issue._axKeyLongDescExtraInfo !== undefined) {
                      extraInfoSpan.textContent = issue._axKeyLongDescExtraInfo;
                      cell.append(br);
                      cell.append(extraInfoSpan);
                  }
                
                  let suggestionText = issue._axKeyIssueSuggestion;
                  let suggestionSpan = document.createElement("span");
                  suggestionSpan.textContent = suggestionText
                  suggestionSpan.classList.add(this.classes.hidden);
                  cell.append(suggestionSpan);

                  issueRowCopy.prepend(cell);

                  issueRowCopy.classList.remove(this.classes.hidden);

                  // Add event handlers
                  var selectIssueRow = () => {
                    // clear out the prior behavior
                    _clearBoxesOnImages();
                    _showAllScreens();

                    let screenID = `ax_report_screen_image_${sectionName}_${issueScreenName}`;
                    let screen = document.getElementById(screenID);
                    let screenBox = _getBoxForScreen(screen);

                    if (issueX !== undefined && issueY !== undefined && issueHeight !== undefined && issueWidth !== undefined) {
                      let issueBox = _getBoxForIssue(issue);
                      let issueBoxElement = _getElementForBox(sectionName, issueScreenName, screenBox, issueBox, 0);
                      screen.appendChild(issueBoxElement);
                      screen.scrollIntoView();
                    }

                    let offscreenCell = issueRowCopy.getElementsByClassName(this.classes.issuesTableOffscreen);
                    if (offscreenCell.length > 0) {
                      offscreenCell[0].classList.remove(this.classes.hidden);
                    }

                    // Set the selected row
                    _clearSelectedRow();
                    
                    this.selectedRow = issueRowCopy;
                    issueRowCopy.classList.add(this.classes.selectedRow);
                  };

                  issueRowCopy.addEventListener("click", (evt) => {
                    evt.stopPropagation();
                    selectIssueRow();
                  });

                  let issueSuggestion = issueRowCopy.getElementsByClassName(this.classes.suggestionIcon)[0];
                  issueSuggestion.addEventListener("click", (evt) => {
                      let isHidden = suggestionSpan.classList.contains(this.classes.hidden);
                      if (isHidden) {
                        suggestionSpan.classList.remove(this.classes.hidden);
                      }
                      else {
                        suggestionSpan.classList.add(this.classes.hidden);
                      }
                  });

                  let issuePreview = issueRowCopy.getElementsByClassName(this.classes.eyeIcon)[0];
                  issuePreview.addEventListener("click", (evt) => {
                    evt.stopPropagation();
                    selectIssueRow();

                    let screenID = `ax_report_screen_image_${sectionName}_${issueScreenName}`;
                    let screen = document.getElementById(screenID);
                    _showImagePreviewForScreen(screen);
                  });

                  return issueRowCopy;
                }

                /**
                 * Generate a table for the given issues within a section
                 **/
                function _generateReportIssuesTable(issues, sectionName) {
                  let issuesTable = document.getElementById(this.ids.issuesTable);
                  let issuesTableCopy = issuesTable.cloneNode(true);
                  let issuesTableBody = issuesTableCopy.getElementsByTagName("tbody");
                  if (issuesTableBody.length > 0) {
                    issuesTableBody = issuesTableBody[0];
                    issues.map((issue) => {
                      let issueRow = issuesTable.getElementsByTagName("tr");
                      if (issueRow.length > 0) {
                        let issueRowCopy = _generateIssueRow(sectionName, issue, issueRow);
                        issuesTableBody.appendChild(issueRowCopy);
                      }
                    });
                  }

                  return issuesTableCopy;
                }

                /**
                 * Remove all issue highlight boxes on the screenshots
                 **/
                 function _clearBoxesOnImages() {
                  // Remove any existing boxes on the screen from other highlights
                  let existingBoxes = document.getElementsByClassName(this.classes.issueBox);
                  for (var i = existingBoxes.length-1; i >= 0; i--) {
                    let existingBox = existingBoxes[i];
                    let existingBoxId = existingBox.getAttribute("id");
                    if (existingBoxId !== this.ids.templateBox) {
                      existingBoxes[i].remove();
                    }
                  }
                }

                /***
                 * Re-show all the screens in the image carousel
                 **/
                function _showAllScreens() {
                  // Show all of the screen elements in the image carousel
                  let screens = document.getElementsByClassName(this.classes.screenImg);
                  for (var i = 0, len = screens.length; i < len; i++) {
                    let screenID = screens[i].getAttribute("id");
                    if (screenID !== this.ids.templateImage) {
                      screens[i].classList.remove(this.classes.hidden);
                    }
                  }
                };

                /**
                 * Hide all screens that don't have any of the issues passed in
                 **/
                function _hideScreensWithoutIssue(sectionName, issues) {
                  // Within a section, hide the screens that don't have any of the given issues passed in
                  let screenNames = {};
                  issues.map((issue) => {
                    let screenName = issue._axKeyScreenName;
                    let screenID = `ax_report_screen_image_${sectionName}_${screenName}`;
                    screenNames[screenID] = true;
                  });

                  let allScreens = document.getElementsByClassName(this.classes.screenImg);
                  for (var i = 0, len = allScreens.length; i < len; i++) {
                    let screen = allScreens[i];
                    let screenId = screen.getAttribute("id");
                    if (!(screenId in screenNames)) {
                      screen.classList.add(this.classes.hidden);
                    }
                  }
                };

                /**
                 * Scroll the image carousel by a certain distance in a given direction
                 **/
                function _scrollImages(direction, width) {
                    const scrollRow = document.getElementById(this.ids.imageRow);
                    if (direction === "prev") {
                        scrollRow.scrollBy({top: 0, left: -width, behavior: "smooth"})
                    } else {
                        scrollRow.scrollBy({top: 0, left: width, behavior: "smooth"});
                    }
                }

                /***
                 * Draw the highlight box on a given screen and optionally focus on it
                 **/
                function _getElementForBox(sectionName, screenName, screenBox, issueBox, issueId) {
                  let templateBox = document.getElementById(this.ids.templateBox);
                  let templateBoxCopy = templateBox.cloneNode(true);
                  templateBoxCopy.setAttribute("id", `ax_report_issue_box_${sectionName}_${screenName}_${issueId}`);

                  if (issueBox.x !== undefined && issueBox.y !== undefined && issueBox.width !== undefined && issueBox.height !== undefined) {
                    let x = issueBox.x / 4;
                    let y = issueBox.y / 4;
                    var width = issueBox.width / 4;
                    var height = issueBox.height / 4;

                    // Readjusting any of the boxes to avoid going offscreen.
                    var right = x + width;
                    var bottom = y + height;
                    if (x < screenBox.width && y < screenBox.height) {
                      if (right > screenBox.right) {
                        right = screenBox.right;
                        width = right - x;
                      }

                      if (bottom > screenBox.bottom) {
                        bottom = screenBox.bottom;
                        height = bottom - y;
                      }

                      templateBoxCopy.style.left = `${x}px`;
                      templateBoxCopy.style.top = `${y}px`;
                      templateBoxCopy.style.width = `${width}px`;
                      templateBoxCopy.style.height = `${height}px`;
                      templateBoxCopy.classList.remove(this.classes.hidden);
                    }
                  }

                  return templateBoxCopy;
                }

                /***
                 * Duplicate the contents of a screen in the image carousel to show in the preview container
                 * at a larger scale
                 **/
                function _showImagePreviewForScreen(screen) {
                  let previewContainer = document.getElementById(this.ids.previewContainer);
                  previewContainer.textContent = "";
                  let screenClone = screen.cloneNode(true);
                  let screenId = screenClone.getAttribute("id");
                  let previewId = `${screenId}-preview`;
                  screenClone.setAttribute("id", previewId);

                  var heightAvailable = window.innerHeight * 0.8;
                  var widthAvailable = window.innerWidth * 0.8;
                  let screenImg = screenClone.getElementsByTagName("img")[0];
                  if (screenImg !== undefined) {
                    let screenHeight = parseFloat(screenImg.getAttribute("height"));
                    let screenWidth = parseFloat(screenImg.getAttribute("width"));

                    var scaleRatio = heightAvailable / screenHeight;
                    if (screenWidth > screenHeight) {
                      scaleRatio = widthAvailable / screenWidth;
                    }

                    // Scale the sizes of the issue boxes to fit the new box size
                    let issueBoxes = screen.getElementsByClassName(this.classes.issueBox);
                    var sizes = [];
                    for (var i = issueBoxes.length-1; i >= 0; i--) {
                      let issueBox = issueBoxes[i];
                      var boxLeft = issueBox.offsetLeft;
                      var boxTop = issueBox.offsetTop;
                      let box = issueBox.getBoundingClientRect();
                      var boxWidth = box.width;
                      var boxHeight = box.height;
                      boxLeft = boxLeft * scaleRatio;
                      boxTop = boxTop * scaleRatio;
                      boxHeight = boxHeight * scaleRatio;
                      boxWidth = boxWidth * scaleRatio;
                      sizes.push({left: boxLeft, top: boxTop, width: boxWidth, height: boxHeight});
                    }

                    let newBoxes = screenClone.getElementsByClassName(this.classes.issueBox);
                    for (var i = newBoxes.length-1; i >= 0; i--) {
                      let box = newBoxes[i];
                      let size = sizes[i];

                      box.style.left = `${size.left}px`;
                      box.style.top = `${size.top}px`;
                      box.style.width = `${size.width}px`;
                      box.style.height = `${size.height}px`;
                    }

                    if (screenWidth > screenHeight) {
                      screenImg.setAttribute("width", widthAvailable);
                      screenImg.setAttribute("height", "");
                    }
                    else {
                      screenImg.setAttribute("height", heightAvailable);
                      screenImg.setAttribute("width", "");
                    }
                  }

                  previewContainer.appendChild(screenClone);
                  previewContainer.classList.remove(this.classes.hidden);
                
                  _showElement(this.ids.dimmer);
                }

                /**
                 * Generate the image carousel contents to show the preview of all screens for a given section
                 * at the top of each tab page.
                 **/
                function _generateAllScreensRow(allScreens, sectionName) {
                    // Populate those as images into the image container
                    let imageContainer = document.getElementById(this.ids.imageContainer);
                    let tabContainer = document.getElementById(`ax_report_${sectionName}_tab`);
                    let imageContainerCopy = imageContainer.cloneNode(true);
                    let imageRow = imageContainerCopy.getElementsByClassName(this.classes.imageRow)[0];
                    imageRow.setAttribute("id", this.ids.imageRow);

                    var screenshotWidth = 100;
                    allScreens.map((screen) => {
                      // Duplicate the template image for all screens
                      let imgTemplate = document.getElementById(this.ids.templateImage);
                      let imgCopy = imgTemplate.cloneNode(true);
                      let imgElement = imgCopy.getElementsByTagName("img")[0];
                      let fullScreenShotName = screen._axKeyScreenName;
                      let imageData = "";
                      if (screen._axKeyImageFull !== undefined) {
                          let fullScreenShotDataBase64 = screen._axKeyImageFull._axKeyImageData;
                          let fullScreenShotWidth = screen._axKeyImageFull._axKeyImageWidth;
                          screenshotWidth = fullScreenShotWidth / 4;
                          imageData = fullScreenShotDataBase64;

                          let fullScreenShotHeight = screen._axKeyImageFull._axKeyImageHeight;
                          imgCopy.setAttribute("id", `ax_report_screen_image_${sectionName}_${fullScreenShotName}`);
                          imgElement.setAttribute("src", fullScreenShotDataBase64);
                          imgElement.setAttribute("width", fullScreenShotWidth / 4);
                          imgElement.setAttribute("height", fullScreenShotHeight / 4);
                          imgElement.setAttribute("alt", "TEST"); // TODO
                      } else {
                        imgElement.classList.add(this.classes.hidden);
                        imgCopy.textContent = "No image data";
                        imgCopy.classList.add(this.classes.screenImgEmpty);
                        imgCopy.setAttribute("id", `ax_report_screen_image_${sectionName}_${fullScreenShotName}`);
                      }

                      imgCopy.addEventListener("click", (evt) => {
                        evt.stopPropagation();
                        _showImagePreviewForScreen(imgCopy);
                      });

                      imageRow.appendChild(imgCopy);
                      imgCopy.classList.remove(this.classes.hidden);
                    });
                    imageContainerCopy.setAttribute("id", `ax_report_${sectionName}_image_container`);
                    imageContainerCopy.classList.remove(this.classes.hidden);

                    // Register listeners for the scroll buttons and scroll wheel
                    let nextButton = imageContainerCopy.getElementsByClassName(this.classes.nextIcon)[0];
                    nextButton.addEventListener("click", () => {
                      _scrollImages("next", screenshotWidth);
                    });

                    let prevButton = imageContainerCopy.getElementsByClassName(this.classes.prevIcon)[0];
                    prevButton.addEventListener("click", () => {
                      _scrollImages("prev", screenshotWidth);
                    });

                    imageRow.addEventListener("wheel", (evt) => {
                        evt.preventDefault();
                        imageRow.scrollLeft += evt.deltaY;
                    });

                    tabContainer.prepend(imageContainerCopy);
                };

                /**
                 * Hide an element given its ID
                 */
                function _hideElement(elementId) {
                    let element = document.getElementById(elementId);
                    element.classList.add(this.classes.hidden);
                }

                /**
                 * Show an element given its ID
                 */
                function _showElement(elementId) {
                    let element = document.getElementById(elementId);
                    element.classList.remove(this.classes.hidden);
                }

                /**
                 * Hide the image preview panel
                 */
                function _hideImagePreview() {
                  _hideElement(this.ids.previewContainer);
                  _hideElement(this.ids.dimmer);
                }

                /**
                 * Clear the selected row and category
                 **/
                function _clearSelectedRow() {
                  if (this.selectedRow !== undefined) {
                    this.selectedRow.classList.remove(this.classes.selectedRow);

                    let offscreenCell = this.selectedRow.getElementsByClassName(this.classes.issuesTableOffscreen);
                    if (offscreenCell.length > 0) {
                      offscreenCell[0].classList.add(this.classes.hidden);
                    }

                    this.selectedRow = undefined;
                  }

                  if (this.selectedCategory !== undefined) {
                    this.selectedCategory.classList.remove(this.classes.selectedCategory);
                    this.selectedCategory = undefined;
                  }
                }

                /***
                 * When a category row is clicked, expand or collapse the section accordingly, and highlight issues contained in the category if the container is being expanded.
                 **/
                function _clickCategoryRow(evt, sectionName, categoryHeader, categoryContainer, issuesInCategory, childElements) {
                  // Dont' bubble the event to the body to trigger deselection;
                  evt.stopPropagation();

                  let downIcon = categoryHeader.getElementsByClassName(this.classes.downIcon)[0];
                  let sideIcon = categoryHeader.getElementsByClassName(this.classes.sideIcon)[0];

                  let firstChild = childElements[0];
                  if (firstChild.classList.contains(this.classes.hidden) || this.selectedCategory !== categoryContainer) {
                    // Show the contents of the container container
                    childElements.map((child) => {
                      child.classList.remove(this.classes.hidden);
                    });
                    downIcon.classList.remove(this.classes.hidden);
                    sideIcon.classList.add(this.classes.hidden);

                    // Clear existing boxes
                    _clearBoxesOnImages();
                    
                    // Show all screens again
                    _showAllScreens();


                    let issuesByScreen = {};
                    issuesInCategory.map((issue) => {
                      if (issue._axKeyScreenName in issuesByScreen) {
                          issuesByScreen[issue._axKeyScreenName].push(issue);
                      } else {
                        issuesByScreen[issue._axKeyScreenName] = [issue];
                      }
                    });

                    Object.keys(issuesByScreen).map((screenName) => {
                      const fragment = document.createDocumentFragment();
                      let issuesOnScreen = issuesByScreen[screenName];

                      let screenID = `ax_report_screen_image_${sectionName}_${screenName}`;
                      let screen = document.getElementById(screenID);

                      // Append all boxes to document fragment rather than individually in case
                      // we have a lot of issues in this category
                      let screenFragment = document.createDocumentFragment();

                      // Get the box for the screen here.
                      let screenBox = _getBoxForScreen(screen);

                      var issueId = 0;
                      issuesOnScreen.map((issue) => {
                        let issueBox = _getBoxForIssue(issue);
                        let issueScreenName = issue._axKeyScreenName;
                        let issueBoxElement = _getElementForBox(sectionName, issueScreenName, screenBox, issueBox, issueId);
                        screenFragment.append(issueBoxElement);
                        issueId += 1;
                      });

                      screen.appendChild(screenFragment);
                    });

                    // Hide all screenshots that don't have this issue
                    _hideScreensWithoutIssue(sectionName, issuesInCategory);

                    // Select the row
                    if (this.selectedCategory !== undefined) {
                      this.selectedCategory.classList.remove(this.classes.selectedCategory);
                    }
                    _clearSelectedRow();
                    
                    this.selectedCategory = categoryContainer;
                    categoryContainer.classList.add(this.classes.selectedCategory);
                  } else {
                    // Hide the contents of the category container
                    childElements.map((child) => {
                      child.classList.add(this.classes.hidden);
                    });
                    downIcon.classList.add(this.classes.hidden);
                    sideIcon.classList.remove(this.classes.hidden);

                    // Clear existing boxes
                    _clearBoxesOnImages();
                    
                    // Show all screens again
                    _showAllScreens();

                    // Select the row
                    if (this.selectedCategory === categoryContainer) {
                      this.selectedCategory.classList.remove(this.classes.selectedCategory);
                      this.selectedCategory = undefined;
                    }
                  }
                }

                return {
                    init: this.init
                };
            }(rootObject));
            AuditReport.init();
        </script>
    </body>
</html>
